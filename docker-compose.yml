services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=https://world.openfoodfacts.org
    volumes:
      - ./data:/app/data
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
