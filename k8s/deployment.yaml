apiVersion: apps/v1
kind: Deployment
metadata:
  name: hashimoto-pcos
  labels:
    app: hashimoto-pcos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hashimoto-pcos
  template:
    metadata:
      labels:
        app: hashimoto-pcos
    spec:
      containers:
        - name: app
          image: ghcr.io/shaunclaw07/hashimoto-pcos:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://world.openfoodfacts.org"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hashimoto-pcos-service
spec:
  selector:
    app: hashimoto-pcos
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hashimoto-pcos-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: hashimoto.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hashimoto-pcos-service
                port:
                  number: 80
