apiVersion: apps/v1
kind: Deployment
metadata:
  name: hashimoto-pcos
  labels:
    app: hashimoto-pcos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hashimoto-pcos
  template:
    metadata:
      labels:
        app: hashimoto-pcos
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: ghcr.io/shaunclaw07/hashimoto-pcos:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: hashimoto-pcos-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: db-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: hashimoto-pcos-data-pvc
